name: "arrs"

x-lockdown: &lockdown
  # prevents write access to the image itself
  read_only: true
  # prevents any process within the container to gain more privileges
  security_opt:
    - "no-new-privileges=true"

services:
  sonarr:
    depends_on:
      postgres:
        condition: "service_healthy"
        restart: true
    image: "11notes/sonarr:4.0.19"
    <<: *lockdown
    environment:
      TZ: "Europe/Zurich"
      SONARR__POSTGRES__HOST: "postgres"
      SONARR__POSTGRES__USER: "postgres"
      SONARR__POSTGRES__PASSWORD: "${POSTGRES_PASSWORD}"
      SONARR__POSTGRES__MAINDB: "postgres"
      SONARR__POSTGRES__LOGDB: "postgres"
    volumes:
      - "sonarr.etc:/sonarr/etc"
    tmpfs:
      # required for read-only image
      - "/tmp:uid=1000,gid=1000"
    ports:
      - "3000:8989/tcp"
    networks:
      frontend:
      backend:
    restart: "always"

  postgres:
    # for more information about this image checkout:
    # https://github.com/11notes/docker-postgres
    image: "11notes/postgres:18"
    <<: *lockdown
    environment:
      TZ: "Europe/Zurich"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    networks:
      backend:
    volumes:
      - "postgres.etc:/postgres/etc"
      - "postgres.var:/postgres/var"
    tmpfs:
      - "/postgres/run:uid=1000,gid=1000"
      - "/postgres/log:uid=1000,gid=1000"
    restart: "always"

volumes:
  sonarr.etc:
  postgres.etc:
  postgres.var:

networks:
  frontend:
  backend:
    internal: true